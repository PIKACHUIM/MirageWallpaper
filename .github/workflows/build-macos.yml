name: Build and publish macOS App

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and package (${{ matrix.arch }})
    strategy:
      matrix:
        arch: [x86_64, arm64]
        include:
          - arch: x86_64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-15
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate build secret
        shell: bash
        env:
          MIRAGE_STEAM_WEB_API_KEY: ${{ secrets.MIRAGE_STEAM_WEB_API_KEY }}
        run: |
          if [[ ! "$MIRAGE_STEAM_WEB_API_KEY" =~ ^[A-Fa-f0-9]{32}$ ]]; then
            echo "::error::Repository secret MIRAGE_STEAM_WEB_API_KEY is missing or invalid."
            exit 1
          fi

          - name: Install build dependencies
        shell: bash
        run: |
          brew install cmake ninja pkg-config llvm molten-vk vulkan-loader \
            vulkan-headers glslang glfw freetype fontconfig lz4 ffmpeg

      - name: Build renderers
        shell: bash
        run: |
          ./SceneRenderer/scripts/build.sh release
          ./WebRenderer/scripts/build.sh release
          ./VideoRenderer/scripts/build.sh release

      - name: Build app bundle
        shell: bash
        env:
          MIRAGE_STEAM_WEB_API_KEY: ${{ secrets.MIRAGE_STEAM_WEB_API_KEY }}
        run: ./Mirage/scripts/build.sh Release

      - name: Verify app bundle
        shell: bash
        run: |
          test -d "Mirage/dist/Mirage.app"
          test -x "Mirage/dist/Mirage.app/Contents/Resources/Renderers/SceneWallpaper"
          test -x "Mirage/dist/Mirage.app/Contents/Resources/Renderers/WebWallpaper"
          test -x "Mirage/dist/Mirage.app/Contents/Resources/Renderers/VideoWallpaper"
          codesign --verify --deep --strict "Mirage/dist/Mirage.app"
          built_in_key="$(/usr/libexec/PlistBuddy -c 'Print :MirageSteamWebAPIKey' \
            "Mirage/dist/Mirage.app/Contents/Info.plist")"
          [[ "$built_in_key" =~ ^[A-Fa-f0-9]{32}$ ]]

      - name: Package app
        id: package
        shell: bash
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            version="$GITHUB_REF_NAME"
          else
            version="${GITHUB_SHA:0:7}"
          fi
          package="Mirage-${version}-macOS-${{ matrix.arch }}.zip"
          ditto -c -k --sequesterRsrc --keepParent \
            "Mirage/dist/Mirage.app" "Mirage/dist/$package"
          shasum -a 256 "Mirage/dist/$package" > "Mirage/dist/$package.sha256"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "package=$package" >> "$GITHUB_OUTPUT"

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: Mirage-${{ steps.package.outputs.version }}-macOS-${{ matrix.arch }}
          path: |
            Mirage/dist/${{ steps.package.outputs.package }}
            Mirage/dist/${{ steps.package.outputs.package }}.sha256
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

  publish:
    name: Publish rolling pre-release
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Create Pre-release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${GITHUB_SHA:0:7}"
          release_tag="prerelease-${version}"
          stable_tag="$(gh api --paginate "repos/$GITHUB_REPOSITORY/releases?per_page=100" --jq '.[] | select(.draft == false and .prerelease == false) | .tag_name' | sed -n '1p')"
          if [[ -n "$stable_tag" ]]; then
            git rev-parse --verify "refs/tags/$stable_tag^{commit}" >/dev/null
            revision_range="$stable_tag..$GITHUB_SHA"
          else
            revision_range="$GITHUB_SHA"
          fi
          raw_notes_file="$RUNNER_TEMP/raw-notes.txt"
          notes_file="$RUNNER_TEMP/prerelease-notes.md"
          git log "$revision_range" --format='- `%h` %s' > "$raw_notes_file"
          if [[ ! -s "$raw_notes_file" ]]; then
            exit 1
          fi
          total_commits=$(wc -l < "$raw_notes_file" | tr -d ' ')
          if [ "$total_commits" -gt 8 ]; then
            head -n 8 "$raw_notes_file" > "$notes_file"
            echo "<details><summary>Show more commits</summary>" >> "$notes_file"
            echo "" >> "$notes_file"
            tail -n +9 "$raw_notes_file" >> "$notes_file"
            echo "" >> "$notes_file"
            echo "</details>" >> "$notes_file"
          else
            cat "$raw_notes_file" > "$notes_file"
          fi
          while IFS=$'\t' read -r release_id old_release_tag; do
            [[ -z "$release_id" ]] && continue
            gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/$release_id"
            if [[ -n "$old_release_tag" ]] && git ls-remote --exit-code --tags origin "refs/tags/$old_release_tag" >/dev/null 2>&1; then
              git push origin ":refs/tags/$old_release_tag"
            fi
          done < <(gh api --paginate "repos/$GITHUB_REPOSITORY/releases?per_page=100" --jq '.[] | select(.prerelease == true) | [.id, .tag_name] | @tsv')
          mkdir release_assets
          find artifacts -type f \( -name "*.zip" -o -name "*.sha256" \) -exec cp {} release_assets/ \;
          gh release create "$release_tag" \
            release_assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Mirage Pre-release ${version}" \
            --notes-file "$notes_file" \
            --prerelease